replicaCount: 1

image:
  repository: ghcr.io/dclawstack/dclaw-wiki
  pullPolicy: IfNotPresent
  tag: ""

service:
  type: ClusterIP
  port: 8113

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: wiki.dclawstack.io
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

postgresql:
  enabled: true
  auth:
    database: dclaw_wiki
    username: postgres
    password: postgres
  primary:
    persistence:
      enabled: true
      size: 10Gi

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

nodeSelector: {}

tolerations: []

affinity: {}
