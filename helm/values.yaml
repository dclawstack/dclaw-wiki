replicaCount: 1

image:
  backend:
    repository: ghcr.io/dclawstack/dclaw-wiki-backend
    tag: latest
    pullPolicy: IfNotPresent
  frontend:
    repository: ghcr.io/dclawstack/dclaw-wiki-frontend
    tag: latest
    pullPolicy: IfNotPresent

service:
  backend:
    type: ClusterIP
    port: 8000
  frontend:
    type: ClusterIP
    port: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}
